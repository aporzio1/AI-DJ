name: AI DJ
options:
  bundleIdPrefix: com.andrewporzio
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: 0.13.5

settings:
  base:
    DEVELOPMENT_TEAM: 7SWMRCM496
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZED_STRING_SWIFTUI_SUPPORT: YES
    LOCALIZED_STRING_MACRO_NAMES: "NSLocalizedString CFCopyLocalizedString"

targets:
  AIDJ:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "26.0"
      macOS: "26.0"
    sources:
      - path: AIDJ
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewporzio.aidj
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GCC_NO_COMMON_BLOCKS: YES
        CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
        CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
        ENABLE_MODULE_VERIFIER: YES
        DEAD_CODE_STRIPPING: YES
    entitlements:
      path: AIDJ/Resources/AIDJ.entitlements
      properties:
        com.apple.security.network.client: true
    info:
      path: AIDJ/Resources/Info.plist
      properties:
        CFBundleDisplayName: AI DJ
        NSAppleMusicUsageDescription: "AI DJ needs access to your Apple Music library to play music."

  AIDJTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AIDJTests
    dependencies:
      - target: AIDJ
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AIDJ.app/Contents/MacOS/AIDJ"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES

schemes:
  AIDJ:
    build:
      targets:
        AIDJ: all
    test:
      targets:
        - AIDJTests
