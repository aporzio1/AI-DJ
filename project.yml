name: Patter
options:
  bundleIdPrefix: com.andrewporzio
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: 0.13.5

settings:
  base:
    DEVELOPMENT_TEAM: 7SWMRCM496
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZED_STRING_SWIFTUI_SUPPORT: YES
    LOCALIZED_STRING_MACRO_NAMES: "NSLocalizedString CFCopyLocalizedString"

targets:
  Patter:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "26.0"
      macOS: "26.0"
    sources:
      - path: Patter
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewporzio.patter
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GCC_NO_COMMON_BLOCKS: YES
        CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
        CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
        ENABLE_MODULE_VERIFIER: YES
        DEAD_CODE_STRIPPING: YES
    entitlements:
      path: Patter/Resources/Patter.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: Patter/Resources/Info.plist
      properties:
        CFBundleDisplayName: Patter
        NSAppleMusicUsageDescription: "Patter needs access to your Apple Music library to play music."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  PatterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PatterTests
    dependencies:
      - target: Patter
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Patter.app/Contents/MacOS/Patter"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Patter:
    build:
      targets:
        Patter: all
    test:
      targets:
        - PatterTests
